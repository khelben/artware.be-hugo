about_eyebrow: "About the artist"
about_p1: "Each piece is shaped by hand and reflects the beauty of organic forms and natural materials. Ceramics as craft and as art."
about_welcome: "Welcome to <b>Artware De Schutter.</b>"
about_p2: "With <b>Artware De Schutter</b>, <b>Lieve De Schutter</b> gives a new, creative continuation to a familiar family story.<br>Her grandparents once laid the foundation with <b>Hardware De Schutter</b>, a shop where quality tableware and household goods could be found by those who appreciated a beautiful table."
about_p3: "Today, Lieve translates that same love into the pottery studio. At the wheel, she creates plates, bowls and dishes that are not only practical, but also bring warmth and character to every table."
about_p4: "<b>Artware De Schutter</b> is thus more than ceramics alone. It is a small nod to the past, an ode to the grandparents who laid the foundation, and a family story that lives on — from shop to studio, from tableware to handmade earthenware."

process_eyebrow: "The process"
process_title: "From clay to artwork"
process_desc: "Each piece is lovingly thrown, trimmed, dried and fired in the kiln."

