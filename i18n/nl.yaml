about_eyebrow: "Over de kunstenaar"
about_p1: "Elk stuk wordt met de hand gevormd en weerspiegelt de schoonheid van organische vormen en natuurlijke materialen. Keramiek als ambacht én als kunst."
about_welcome: "Welkom bij <b>Artware De Schutter.</b>"
about_p2: "Met <b>Artware De Schutter</b> geeft <b>Lieve De Schutter</b> een nieuw, creatief vervolg aan een vertrouwd familieverhaal.<br>Haar grootouders legden ooit de basis met <b>Hardware De Schutter</b>, een winkel waar in het verleden servies en huishoudelijke spullen te vinden waren voor wie hield van kwaliteit en een mooie tafel."
about_p3: "Vandaag vertaalt Lieve diezelfde liefde naar het pottenbakkersatelier. Aan de draaischijf ontstaan borden, kommen en schalen die niet alleen praktisch zijn, maar ook warmte en karakter brengen aan elke tafel."
about_p4: "<b>Artware De Schutter</b> is zo meer dan keramiek alleen. Het is een kleine knipoog naar het verleden, een ode aan de grootouders die het fundament legden, en een familieverhaal dat verder leeft: van winkel naar atelier, van servies naar handgemaakt keramiek."

process_eyebrow: "Het proces"
process_title: "Van klei tot kunstwerk"
process_desc: "Elk stuk wordt met liefde gedraaid, afgedraaid, gedroogd, geglazuurd en gebakken in de oven."

