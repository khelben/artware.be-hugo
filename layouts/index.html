<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }}</title>
    <link rel="icon" type="image/png" href="{{ "images/favicon.png" | relURL }}">
    <link rel="apple-touch-icon" href="{{ "images/favicon.png" | relURL }}">
    <link rel="stylesheet" href="https://unpkg.com/photoswipe@5/dist/photoswipe.css">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
    <header class="site-header">
        <img src="{{ .Site.Params.logo | relURL }}" alt="{{ .Site.Title }}" class="logo">
    </header>

    <div class="pswp-gallery" id="gallery">
        {{ range resources.Match "images/slide*.jpg" }}
            {{ $thumb := .Resize "400x" }}
            <a href="{{ .RelPermalink }}"
               data-pswp-width="{{ .Width }}"
               data-pswp-height="{{ .Height }}"
               target="_blank">
                <img src="{{ $thumb.RelPermalink }}" alt="" loading="lazy">
            </a>
        {{ end }}
    </div>

    <script type="module" src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
